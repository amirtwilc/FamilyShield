<script>
        // Micro-interaction for the refresh button
        document.querySelector('.absolute.top-4 button').addEventListener('click', function() {
            const icon = this.querySelector('.material-symbols-outlined');
            icon.classList.add('animate-spin');
            setTimeout(() => {
                icon.classList.remove('animate-spin');
            }, 1000);
        });

        // Simple parallax effect for map on movement
        document.addEventListener('mousemove', (e) => {
            const map = document.querySelector('[data-location="Chicago"]');
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            map.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
        });
    </script>
