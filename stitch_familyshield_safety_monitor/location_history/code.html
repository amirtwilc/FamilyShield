<style>

<body class="bg-background text-on-surface">
<!-- Top App Bar -->

</button>
</header>
<main class="pb-24 max-w-2xl mx-auto">
<!-- Date Picker Section -->

<h2 class="font-headline-sm text-headline-sm text-primary">History</h2>
<button class="flex items-center gap-2 px-4 py-2 bg-secondary-container text-on-secondary-container rounded-full font-label-lg transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]">calendar_today</span>
                    Today, Oct 24
                </button>
</div>
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
<!-- Quick Date Selection -->
<button class="flex-shrink-0 w-12 h-16 flex flex-col items-center justify-center rounded-2xl bg-primary text-on-primary shadow-lg">
<span class="text-label-sm font-medium">THU</span>
<span class="text-body-lg font-bold">24</span>
</button>
<button class="flex-shrink-0 w-12 h-16 flex flex-col items-center justify-center rounded-2xl bg-surface-container border border-outline-variant/30 text-on-surface-variant">
<span class="text-label-sm font-medium">WED</span>
<span class="text-body-lg font-bold">23</span>
</button>
<button class="flex-shrink-0 w-12 h-16 flex flex-col items-center justify-center rounded-2xl bg-surface-container border border-outline-variant/30 text-on-surface-variant">
<span class="text-label-sm font-medium">TUE</span>
<span class="text-body-lg font-bold">22</span>
</button>
<button class="flex-shrink-0 w-12 h-16 flex flex-col items-center justify-center rounded-2xl bg-surface-container border border-outline-variant/30 text-on-surface-variant">
<span class="text-label-sm font-medium">MON</span>
<span class="text-body-lg font-bold">21</span>
</button>
<button class="flex-shrink-0 w-12 h-16 flex flex-col items-center justify-center rounded-2xl bg-surface-container border border-outline-variant/30 text-on-surface-variant">
<span class="text-label-sm font-medium">SUN</span>
<span class="text-body-lg font-bold">20</span>
</button>
<button class="flex-shrink-0 w-12 h-16 flex flex-col items-center justify-center rounded-2xl bg-surface-container border border-outline-variant/30 text-on-surface-variant">
<span class="text-label-sm font-medium">SAT</span>
<span class="text-body-lg font-bold">19</span>
</button>
</div>
</section>
<!-- Timeline Section -->
<section class="mt-4 px-4 space-y-0">
<!-- Event: Arrived at School -->

</div>

<div class="flex justify-between items-start mb-2">
<div>

</div>
<span class="px-2 py-1 bg-tertiary-fixed text-on-tertiary-fixed-variant text-label-sm rounded-md font-bold">SAFE ZONE</span>
</div>

</div>

</div>
<div class="bg-white/60 backdrop-blur-sm rounded-xl p-4 border border-outline-variant/20 shadow-sm">
<div class="flex justify-between items-start">
<div>
<p class="font-label-sm text-on-surface-variant uppercase tracking-wider mb-1">08:10 AM</p>
<h3 class="font-headline-sm text-[18px] text-on-surface">Commute</h3>
<p class="text-body-md text-on-surface-variant flex items-center gap-1 mt-1">

<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
<button class="absolute bottom-2 right-2 flex items-center gap-1.5 px-3 py-1.5 bg-white/90 backdrop-blur text-primary rounded-full font-label-lg shadow-sm">
<span class="material-symbols-outlined text-[16px]">open_in_new</span>
                            Explore Route
                        </button>
</div>
</div>
</div>
<!-- Event: Left Home -->
<div class="timeline-item relative pl-12 pb-6">

</div>
<div class="bg-surface-container-low rounded-xl p-4 border border-outline-variant/20 shadow-sm">
<div class="flex justify-between items-start">
<div>
<p class="font-label-sm text-on-surface-variant uppercase tracking-wider mb-1">08:05 AM</p>
<h3 class="font-headline-sm text-[18px] text-primary">Left Home</h3>
</div>
</div>
<div class="mt-4 flex gap-2">
<button class="flex-1 flex items-center justify-center gap-2 py-2.5 outline outline-1 outline-primary text-primary rounded-lg font-label-lg hover:bg-primary-fixed/30 transition-all active:scale-95">

<!-- Dashboard -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-sm text-label-sm">Dashboard</span>
</a>
<!-- Map -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined">map</span>
<span class="font-label-sm text-label-sm">Map</span>
</a>
<!-- History (ACTIVE) -->
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-full px-5 py-1 transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history</span>

</a>
<!-- Zones -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant px-5 py-1 hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined">location_on</span>
<span class="font-label-sm text-label-sm">Zones</span>
</a>
</nav>
<script>
        // Simple scroll observer for top bar shadow depth
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 10) {
                header.classList.add('shadow-md');
                header.classList.remove('shadow-sm');
            } else {
                header.classList.add('shadow-sm');
                header.classList.remove('shadow-md');
            }
        });

        // Toggle date selection
        const dateButtons = document.querySelectorAll('.flex-shrink-0.w-12');
        dateButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                dateButtons.forEach(b => {
                    b.classList.remove('bg-primary', 'text-on-primary', 'shadow-lg');
                    b.classList.add('bg-surface-container', 'border', 'border-outline-variant/30', 'text-on-surface-variant');
                });
                btn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg');
                btn.classList.remove('bg-surface-container', 'border', 'border-outline-variant/30', 'text-on-surface-variant');
            });
        });
    </script>
</body></html>
